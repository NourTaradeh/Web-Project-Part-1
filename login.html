<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تسجيل الدخول - نظام الكورسات</title>
  <link rel="stylesheet" href="login.css">
</head>

<body>
  <div class="page">
    <div class="box">
      <h1>CourseHub</h1>
      <p>أدخل بياناتك للدخول إلى حسابك</p>

      <div class="error" id="errorMsg"></div>
      <form action="" onsubmit="return false">
        <label for="email">البريد الإلكتروني</label>
        <input type="email" id="email" placeholder="example@ppu.edu.ps" required>

        <label for="password">كلمة المرور</label>
        <input type="password" id="password" placeholder="كلمة المرور" required>

        <button class="btn-login" onclick="doLogin()">دخول</button>
      </form>

      <div class="hint">
        <strong>للتجربة:</strong><br>
        ادمن: admin@ppu.edu.ps / admin123
      </div>
    </div>
  </div>

  <script src="data.js"></script>
  <script src="login.js"></script>
</body>

</html>
