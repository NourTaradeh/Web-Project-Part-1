<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>صفحة الطالب - نظام الكورسات</title>
  <link rel="stylesheet" href="student.css">
</head>
<body>

  <nav class="navbar">
    <div class="nav-brand">CourseHub</div>

    <div class="nav-tabs" id="navTabs">
      <div class="nav-tab active" id="tab-dashboard" onclick="showPage('dashboard')">الرئيسية</div>
      <div class="nav-tab" id="tab-courses"   onclick="showPage('courses')">الكورسات</div>
      <div class="nav-tab" id="tab-mycourses" onclick="showPage('mycourses')">كورساتي</div>
    </div>

    <div class="nav-left">
      <span class="nav-username" id="navUser">الطالب</span>
      <button class="btn-logout" onclick="logout()">خروج</button>
      <button class="menu-btn" onclick="toggleMenu()">&#9776;</button>
    </div>
  </nav>

  <div class="mobile-menu" id="mobileMenu">
    <div class="mobile-tab" onclick="showPage('dashboard')">الرئيسية</div>
    <div class="mobile-tab" onclick="showPage('courses')">الكورسات</div>
    <div class="mobile-tab" onclick="showPage('mycourses')">كورساتي</div>
  </div>

  <main class="main">
    <div id="alertBox" class="alert-box"></div>
    <div id="mainContent"></div>
  </main>

  <div class="confirm-overlay" id="confirmOverlay" onclick="handleOverlayClick(event)">
    <div class="confirm-modal" id="confirmModal">
      <div class="confirm-title" id="confirmTitle">تأكيد</div>
      <div class="confirm-message" id="confirmMessage"></div>
      <div class="confirm-actions">
        <button class="confirm-btn confirm-btn-cancel" onclick="closeConfirm()">إلغاء</button>
        <button class="confirm-btn confirm-btn-green" id="confirmOkBtn">تأكيد</button>
      </div>
    </div>
  </div>

  <script src="data.js"></script>
  <script src="student.js"></script>
</body>
</html>
